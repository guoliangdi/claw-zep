[tool.black]
line-length = 100
target-version = ["py311"]
exclude = "graphiti/"

[tool.isort]
profile = "black"
line_length = 100
skip = ["graphiti"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
exclude = ["graphiti/", "migrations/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
